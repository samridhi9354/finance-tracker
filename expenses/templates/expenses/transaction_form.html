{% extends 'base.html' %}
{% block title %}{{ title }} - Finance Tracker{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-6">{{ title }}</h1>

    <form method="post" class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 space-y-4">
        {% csrf_token %}

        {% for field in form %}
        <div>
            <label class="block text-sm font-medium mb-1" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
            <p class="text-xs text-red-500 mt-1">{{ error }}</p>
            {% endfor %}
        </div>
        {% endfor %}

        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition-colors">
                Save
            </button>
            <a href="{% url 'transaction_list' %}"
                class="flex-1 text-center bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 font-medium py-2 rounded-lg transition-colors">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
