{% extends 'base.html' %}
{% block title %}Login - Finance Tracker{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-sm bg-white dark:bg-gray-800 rounded-2xl shadow-md p-8 border border-gray-100 dark:border-gray-700">
        <div class="text-center mb-6">
            <div class="text-3xl mb-2">💰</div>
            <h1 class="text-xl font-bold">Welcome back</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">Log in to manage your finances</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300 text-sm rounded-lg px-3 py-2 mb-4">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1" for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required autofocus
                    class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition-colors">
                Log In
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
            Don't have an account?
            <a href="{% url 'signup' %}" class="text-indigo-600 dark:text-indigo-400 font-medium hover:underline">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
